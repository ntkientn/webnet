<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kien WebNet - Digital Core Hub</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0f132a; 
            --header-bg: #1e2548;
            --card-bg: #161b35;
            --card-border: rgba(99, 102, 241, 0.25);
            --card-hover-border: #6366f1;
            
            --accent-indigo: #818cf8; 
            --accent-cyan: #22d3ee;   
            --accent-magenta: #f472b6; 
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            
            --color-live: #10b981;
            --color-error: #f87171;
            --color-maintenance: #fbbf24;
            --color-offline: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: 3rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* --- BACKGROUND SYSTEM --- */
        .cyber-bg-system {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .digital-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.15) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .mouse-glow-pointer {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            top: -9999px;
            left: -9999px;
            transition: transform 0.08s ease-out;
            will-change: transform, top, left;
        }

        .network-stream {
            position: absolute;
            height: 2px;
            width: 400px;
            filter: drop-shadow(0 0 10px var(--accent-indigo));
            opacity: 0.8;
        }
        .line-1 { top: 25%; left: -400px; background: linear-gradient(90deg, transparent, var(--accent-indigo), transparent); animation: sweepRight 6s linear infinite; }
        .line-2 { top: 70%; right: -400px; background: linear-gradient(90deg, transparent, var(--accent-magenta), transparent); animation: sweepLeft 9s linear infinite; }
        .line-3 { top: 50%; left: -400px; background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent); animation: sweepRight 12s linear infinite; }

        @keyframes sweepRight { 0% { left: -400px; } 100% { left: 100%; } }
        @keyframes sweepLeft { 0% { right: -400px; } 100% { right: 100%; } }

        .ambient-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, transparent 75%);
            top: -150px;
            left: -50px;
        }

        /* --- CONTAINER --- */
        .container {
            max-width: 1140px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--header-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem 2.5rem;
            border-radius: 20px;
            margin-bottom: 3.5rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .avatar-box {
            position: relative;
            display: flex;
        }

        .avatar-box::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-indigo), var(--accent-cyan));
            z-index: -1;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--header-bg);
        }

        .brand-title h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand-title p {
            font-size: 0.8rem;
            color: var(--accent-cyan);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.1rem;
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .stat-item {
            text-align: right;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .stat-value .led-dot {
            width: 8px;
            height: 8px;
            background-color: var(--color-live);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--color-live);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        /* GRID SYSTEM */
        .web-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        /* WEB CARD */
        .web-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.15rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.25s ease-in-out;
        }

        .web-card:hover {
            transform: translateY(-4px);
            border-color: var(--card-hover-border);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.3);
            background: #1c2242;
        }

        /* TỐI ƯU UI CHO CARD BỊ KHÓA (DISABLE) */
        .web-card.disabled-card {
            /* Bỏ opacity cũ, giữ nền rõ nét nhưng đổi sang dạng kính mờ tối hơn */
            background: rgba(15, 19, 42, 0.6); 
            border: 1px dashed rgba(148, 163, 184, 0.2); /* Viền nét đứt tinh tế */
            cursor: not-allowed;
            box-shadow: none;
            transform: none !important;
            transition: border-color 0.25s ease;
        }
        
        .web-card.disabled-card:hover {
            border-color: rgba(255, 255, 255, 0.05) !important;
            background: rgba(22, 27, 53, 0.6) !important;
            box-shadow: none !important;
        }

        .web-card.disabled-card .btn-action-trigger,
        .web-card.disabled-card .sublink-item {
            pointer-events: none; /* Khóa triệt để mọi hành vi rê chuột click vào nút bên trong */
        }

        .card-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .icon-and-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-icon-box {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            font-size: 1.1rem;
        }

        .web-card:not(.disabled-card):hover .card-icon-box {
            background: var(--accent-indigo);
            color: #fff;
            border-color: transparent;
        }

        .card-status-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.4);
        }
        
        .card-status-badge .mini-led {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .btn-action-trigger {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-action-trigger:hover {
            background: #fff;
            color: var(--bg-main);
            transform: scale(1.1);
        }

        /* CARD CONTENT INNER */
        .card-info-cluster {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .card-info-cluster h3 {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.3;
            color: #fff;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .card-tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }

        .tag {
            font-size: 0.65rem;
            padding: 0.15rem 0.45rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        /* SUBLINKS SUITE */
        .card-sublinks-zone {
            margin-top: auto;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sublinks-grid {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .sublink-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #cbd5e1;
            font-size: 0.8rem;
            padding: 0.5rem 0.6rem;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.2s ease;
        }

        .sublink-item:hover {
            background: rgba(99, 102, 241, 0.15);
            color: #fff;
            border-color: rgba(99, 102, 241, 0.4);
        }

        .sublink-target-blank-btn {
            color: var(--text-muted);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .sublink-target-blank-btn:hover {
            color: var(--accent-cyan);
            background: rgba(255,255,255,0.08);
            transform: scale(1.1);
        }

        .empty-sub-notice {
            font-size: 0.75rem;
            color: transparent;
            user-select: none;
            padding: 0.35rem 0;
        }

        footer {
            text-align: center;
            margin-top: 5rem;
            padding: 2rem 0;
            color: #475569;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1rem; text-align: center; padding: 1.5rem; }
            .header-stats { width: 100%; justify-content: space-around; }
            .web-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- DIGITAL SYSTEM BACKGROUND -->
    <div class="cyber-bg-system">
        <div class="digital-grid"></div>
        <div class="ambient-orb"></div>
        <div class="mouse-glow-pointer" id="mouseGlow"></div>
        <div class="network-stream line-1"></div>
        <div class="network-stream line-2"></div>
        <div class="network-stream line-3"></div>
    </div>

    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="header-left">
                <div class="avatar-box">
                    <img src="https://github.com/ntkientn/mypage/blob/master/avatar.jpg?raw=true" alt="Nguyen Trung Kien" class="avatar">
                </div>
                <div class="brand-title">
                    <h1>Kien WebNet</h1>
                    <p>Digital Core Hub</p>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalPageValue">0</div>
                    <div class="stat-label">Total Pages</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value"><span class="led-dot"></span>Live</div>
                    <div class="stat-label">System Status</div>
                </div>
            </div>
        </header>

        <!-- GRID PLATFORM -->
        <main class="web-grid" id="linksGrid">
            <!-- Dynamic Injection -->
        </main>

        <footer>
            <p>&copy; 2026 Kien WebNet. Node Topology Matrix System.</p>
        </footer>
    </div>

    <script>
        const webPages = [
            {
                title: "Nguyen Trung Kien Portfolio",
                description: "Trang Hồ Sơ của tôi với AI Chatbot tích hợp sẽ cung cấp mọi thông tin sự nghiệp, năng lực cốt lõi và các chứng chỉ chuyên môn cá nhân.",
                url: "https://ntkientn.github.io/mypage/",
                icon: "fa-user-tie",
                status: "live", 
                tags: ["Personal", "Portfolio"],
                subpages: []
            },
            {
                title: "TodoToday", 
                description: "Hệ thống lên lịch công việc trọng yếu trong 1 ngày, giám sát tiến độ, hiệu suất và tạo động lực cho user tập trung hoàn thành.",
                url: "https://ntkientn.github.io/mypage/todotoday.html",
                icon: "fa-regular fa-calendar-check", 
                status: "live",
                tags: ["Professional", "Plan", "Performance", "Track", "Motivation"],
                subpages: []
            },
            {
                title: "AI Hub",
                description: "Với AI Chatbot tích hợp, AI Hub sẽ giúp tìm ra AI Tools tốt nhất, phù hợp nhất để tối ưu hiệu suất cho mọi nhu cầu và công việc.",
                url: "https://ntkientn.github.io/AIhub/",
                icon: "fa-brain",
                status: "live",
                tags: ["AI", "Tech", "Hub"],
                subpages: []
            },
            {
                title: "PM Deck", 
                description: "Hệ thống quản lý dự án thực chiến, trạm chỉ huy quy trình và công cụ điều hành.",
                url: "https://ntkientn.github.io/mypage/pmdeck/",
                icon: "fa-chart-gantt", 
                status: "live",
                tags: ["Management", "Professional", "Hub", "Deck"],
                subpages: [
                    { title: "PM Tool Advisor", url: "https://ntkientn.github.io/mypage/pmdeck/pmtooladvisor.html" },
                    { title: "PM Tools Reference", url: "https://ntkientn.github.io/mypage/pmdeck/pmtoolsref.html" }
                ]
            },
            {
                title: "News Hub",
                description: "Nơi tổng hợp thông tin, cập nhật tin tức công nghệ và xã hội hằng ngày.",
                url: "https://ntkientn.github.io/mypage/news/",
                icon: "fa-newspaper",
                status: "live",
                tags: ["News", "Aggregator", "Hub"],
                subpages: []
            },            
            {
                title: "Healthcare Hub",
                description: "Không gian lưu trữ thông tin kiến thức về sức khỏe, các bệnh thường gặp, và cập nhật tin tức thường thức về y học, sức khỏe và đời sống.",
                url: "https://ntkientn.github.io/health/",
                icon: "fa-solid fa-heart-pulse", 
                status: "live",
                tags: ["Personal", "Health", "Medical", "Hub", "Knowledge"],
                subpages: [
                    { title: "Bệnh Rối Loạn Lo Âu Trầm Cảm", url: "https://ntkientn.github.io/health/loautramcam.html" },
                    { title: "Bệnh Gout", url: "https://ntkientn.github.io/health/gout/" }
                ]
            },
            {
                title: "Learn Now",
                description: "Hệ thống cung cấp kiến thức, kỹ năng và phương pháp rèn luyện phát triển năng lực cá nhân.",
                url: "https://ntkientn.github.io/learn/",
                icon: "fa-solid fa-person-chalkboard", 
                status: "live",
                tags: ["Personal", "Learn", "Professional", "Knowledge", "Skill", "Trainning"],
                subpages: []
            },
            {
                title: "Lunar Calendar - Âm Lịch",
                description: "Web tra cứu Âm Lịch, tạo note và event của ngày âm lịch đó lên Lịch Google của bạn",
                url: "https://ntkientn.github.io/amlich/",
                icon: "fa-solid fa-yin-yang",
                status: "live",
                tags: ["Personal", "Life"],
                subpages: []
            },
            {
                title: "Khang's Arcade",
                description: "Không gian giải trí và trải nghiệm các mini-game tương tác vui nhộn.",
                url: "https://ntkientn.github.io/mypage/minigame/",
                icon: "fa-gamepad",
                status: "live",
                tags: ["Gaming", "Entertainment", "Deck"],
                subpages: []
            },
            {
                title: "Khang's Tutor (Gia sư cho Khang)",
                description: "Gia sư cung cấp kiến thức và bài tập rèn luyện chương trình phổ thông",
                url: "https://ntkientn.github.io/mypage/khangtutor/",
                icon: "fa-user-graduate",
                status: "coming",
                tags: ["Personal", "Life"],
                subpages: []
            },
            {
                title: "Workout Trainer",
                description: "Cung cấp các bài tập theo từng đối tượng, nhu cầu, mục tiêu cụ thể",
                url: "https://ntkientn.github.io/mypage/workout/",
                icon: "fa-person-running",
                status: "coming",
                tags: ["Personal", "Workout", "Sport"],
                subpages: []
            },
            {
                title: "Knowledge Base",
                description: "Web chúa thông tin kiến thức về tự nhiên và cuộc sóng",
                url: "https://ntkientn.github.io/mypage/knowledge/",
                icon: "fa-book-atlas", 
                status: "coming",
                tags: ["Personal", "Life", "Knowledge"],
                subpages: []
            }
        ];

        const statusConfig = {
            live: { text: "Active", color: "var(--color-live)" },
            error: { text: "Disconnect", color: "var(--color-error)" },
            maintenance: { text: "Maintenance", color: "var(--color-maintenance)" },
            coming: { text: "Coming soon", color: "var(--color-offline)" }
        };

        // HIỆU ỨNG CHUỘT
        const mouseGlow = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            mouseGlow.style.left = e.clientX + 'px';
            mouseGlow.style.top = e.clientY + 'px';
        });

        // HÀM ĐIỀU HƯỚNG SỰ KIỆN CLICK TAB TỰ DO
        function navigate(event, url, isBlank) {
            event.stopPropagation();
            if (isBlank) {
                window.open(url, '_blank');
            } else {
                window.location.href = url;
            }
        }

        function renderGrid() {
            const gridContainer = document.getElementById('linksGrid');
            gridContainer.innerHTML = '';
            
            let totalPages = webPages.length;
            webPages.forEach(p => { if(p.subpages) totalPages += p.subpages.length; });
            document.getElementById('totalPageValue').innerText = totalPages;

            webPages.forEach(page => {
                const currentStatus = statusConfig[page.status] || statusConfig.offline;
                const isLive = page.status === 'live';

                // KIỂM TRA ĐIỀU KIỆN ĐỂ SET EVENT ONCLICK VÀ CSS
                const cardClass = isLive ? "web-card" : "web-card disabled-card";
                const cardClickEvent = isLive ? `onclick="navigate(event, '${page.url}', false)"` : "";

                let sublinksHTML = `<div class="empty-sub-notice"></div>`;
                // Chỉ hiển thị subpages nếu card ở trạng thái active (live) để đảm bảo sạch UI
                if(isLive && page.subpages && page.subpages.length > 0) {
                    sublinksHTML = `<div class="sublinks-grid">`;
                    page.subpages.forEach(sub => {
                        sublinksHTML += `
                            <div class="sublink-item" onclick="navigate(event, '${sub.url}', false)">
                                <span><i class="fa-solid fa-square-poll-horizontal" style="margin-right: 6px; color: var(--accent-cyan); font-size:11px;"></i>${sub.title}</span>
                                <div class="sublink-target-blank-btn" onclick="navigate(event, '${sub.url}', true)" title="Mở trong tab mới">
                                    <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 11px;"></i>
                                </div>
                            </div>
                        `;
                    });
                    sublinksHTML += `</div>`;
                }

                const tagsHTML = page.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

                // NÚT ACTION PHÍA TRÊN BÊN PHẢI CHỈ XUẤT HIỆN KHI CARD LIVE
                const actionButtonHTML = isLive ? `
                    <div class="btn-action-trigger" onclick="navigate(event, '${page.url}', true)" title="Mở trong tab mới">
                        <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 12px;"></i>
                    </div>` : `<div></div>`;

                const cardHTML = `
                    <div class="${cardClass}" ${cardClickEvent}>
                        <div class="card-header-row">
                            <div class="icon-and-status">
                                <div class="card-icon-box">
                                    <i class="fa-solid ${page.icon}"></i>
                                </div>
                                <div class="card-status-badge" style="color: ${currentStatus.color}; border: 1px solid ${currentStatus.color}44;">
                                    <span class="mini-led" style="background-color: ${currentStatus.color}; box-shadow: 0 0 8px ${currentStatus.color};"></span>
                                    ${currentStatus.text}
                                </div>
                            </div>
                            ${actionButtonHTML}
                        </div>

                        <div class="card-info-cluster">
                            <h3>${page.title}</h3>
                            <p class="card-desc">${page.description}</p>
                            <div class="card-tags">${tagsHTML}</div>
                        </div>

                        <div class="card-sublinks-zone">
                            ${sublinksHTML}
                        </div>
                    </div>
                `;
                
                gridContainer.innerHTML += cardHTML;
            });
        }

        window.addEventListener('DOMContentLoaded', renderGrid);
    </script>
</body>
</html>

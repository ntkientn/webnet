<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern News Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --accent: #0066cc;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
        }

        .btn-refresh {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-refresh:hover {
            background-color: #0052a3;
        }

        main {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Tabs Navigation cho các Section */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* News Feed Layout */
        .news-section {
            display: none;
        }

        .news-section.active {
            display: block;
        }

        /* Phong cách hiển thị bài báo: Tập trung vào Content lớn, dễ đọc */
        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            max-width: 800px; /* Bóp nhẹ độ rộng để mắt không phải điều tiết quá xa khi đọc */
            margin: 0 auto;
        }

        .news-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.04);
        }

        .news-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.65rem; /* Kích thước chữ lớn, rõ ràng */
            line-height: 1.35;
            margin-bottom: 0.8rem;
        }

        .news-title a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
        }

        .news-title a:hover {
            color: var(--accent);
        }

        .news-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
        }

        .news-desc {
            font-size: 1.05rem;
            color: #333333;
            line-height: 1.6;
        }

        .news-desc img {
            display: none; /* Ẩn ảnh thừa từ RSS để giữ giao diện tối giản, tập trung vào chữ */
        }

        /* Nút See More */
        .load-more-container {
            text-align: center;
            margin-top: 3rem;
        }

        .btn-load-more {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-load-more:hover {
            background: var(--accent);
            color: white;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-muted);
            padding: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">The News Hub</a>
        <button class="btn-refresh" onclick="refreshAllFeeds()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            Làm mới tin
        </button>
    </header>

    <main>
        <div class="tabs" id="tabs-nav"></div>

        <div id="news-container"></div>

        <div class="load-more-container">
            <button class="btn-load-more" id="btn-see-more" onclick="loadMoreNews()">See more...</button>
        </div>
    </main>

    <script>
        // Cấu hình các nguồn RSS Feed của bạn
        const FEEDS = [
            { id: "vn-moi-nhat", name: "VnExpress - Mới Nhất", url: "https://vnexpress.net/rss/tin-moi-nhat.rss" },
            { id: "vn-noi-bat", name: "VnExpress - Nổi Bật", url: "https://vnexpress.net/rss/tin-noi-bat.rss" },
            { id: "vn-xem-nhieu", name: "VnExpress - Xem Nhiều", url: "https://vnexpress.net/rss/tin-xem-nhieu.rss" },
            { id: "vn-the-thao", name: "VnExpress - Thể Thao", url: "https://vnexpress.net/rss/the-thao.rss" },
            { id: "intl-news", name: "Reuters World News", url: "https://www.reutersagency.com/feed/?best-regions=international&post_type=best" },
            { id: "inspiration", name: "Bài học cuộc sống (Zen Habits)", url: "https://zenhabits.net/feed/" }
        ];

        let currentTab = FEEDS[0].id;
        let feedDataCache = {}; // Lưu trữ dữ liệu sau khi fetch về
        let displayCounts = {}; // Theo dõi số lượng bài đang hiển thị của mỗi tab

        // Khởi tạo ứng dụng
        function init() {
            const tabsNav = document.getElementById('tabs-nav');
            const container = document.getElementById('news-container');

            FEEDS.forEach((feed, index) => {
                // Tạo các nút chuyển Tab
                const button = document.createElement('button');
                button.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                button.innerText = feed.name;
                button.onclick = () => switchTab(feed.id);
                button.setAttribute('id', `tab-btn-${feed.id}`);
                tabsNav.appendChild(button);

                // Tạo các section chứa bài tương ứng
                const section = document.createElement('div');
                section.className = `news-section ${index === 0 ? 'active' : ''}`;
                section.setAttribute('id', `section-${feed.id}`);
                section.innerHTML = `<div class="news-grid" id="grid-${feed.id}"></div>`;
                container.appendChild(section);

                // Khởi tạo bộ đếm bài hiển thị mặc định bằng 10
                displayCounts[feed.id] = 10;
            });

            fetchAllFeeds();
        }

        // Lấy dữ liệu từ RSS thông qua API trung gian để tránh lỗi CORS
        async function fetchAllFeeds() {
            document.getElementById('news-container').style.opacity = '0.5';
            
            const promises = FEEDS.map(async (feed) => {
                try {
                    // Sử dụng rss2json service miễn phí
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await response.json();
                    if (data.status === 'ok') {
                        feedDataCache[feed.id] = data.items;
                        renderFeed(feed.id);
                    } else {
                        document.getElementById(`grid-${feed.id}`).innerHTML = `<p class="loading">Không thể tải dữ liệu từ nguồn này.</p>`;
                    }
                } catch (error) {
                    document.getElementById(`grid-${feed.id}`).innerHTML = `<p class="loading">Lỗi kết nối khi tải nguồn tin.</p>`;
                }
            });

            await Promise.all(promises);
            document.getElementById('news-container').style.opacity = '1';
        }

        // Render dữ liệu lên giao diện dựa theo số lượng bài được phép hiển thị
        function renderFeed(feedId) {
            const grid = document.getElementById(`grid-${feedId}`);
            const items = feedDataCache[feedId] || [];
            const maxDisplay = displayCounts[feedId];

            grid.innerHTML = ''; // Clear trước khi render mới

            if(items.length === 0) {
                grid.innerHTML = '<p class="loading">Đang tải tin tức...</p>';
                return;
            }

            // Lấy tối đa theo giới hạn hiện tại (10, 20, 30...)
            const itemsToDisplay = items.slice(0, maxDisplay);

            itemsToDisplay.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';

                // Xử lý làm sạch mô tả (Xóa thẻ img nếu có để tập trung vào phần text)
                let cleanDesc = item.description.replace(/<img[^>]*>/g, "");
                // Cắt ngắn nếu mô tả quá dài trong RSS của một số trang quốc tế
                if(cleanDesc.length > 250) {
                    cleanDesc = cleanDesc.substring(0, 250) + '...';
                }

                // Format ngày tháng hiển thị cơ bản
                const pubDate = new Date(item.pubDate).toLocaleDateString('vi-VN', {
                    hour: '2-digit', minute:'2-digit', day: '2-digit', month: '2-digit'
                });

                card.innerHTML = `
                    <h2 class="news-title">
                        <a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a>
                    </h2>
                    <div class="news-meta">
                        <span>${item.author || 'News Hub'}</span>
                        <span>•</span>
                        <span>${pubDate}</span>
                    </div>
                    <div class="news-desc">${cleanDesc}</div>
                `;
                grid.appendChild(card);
            });

            // Ẩn/Hiện nút See More nếu đã hết bài để hiển thị
            const seeMoreBtn = document.getElementById('btn-see-more');
            if (maxDisplay >= items.length) {
                seeMoreBtn.style.display = 'none';
            } else {
                seeMoreBtn.style.display = 'inline-block';
            }
        }

        // Chuyển đổi giữa các danh mục tin
        function switchTab(feedId) {
            currentTab = feedId;

            // Cập nhật trạng thái nút bấm active
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-btn-${feedId}`).classList.add('active');

            // Cập nhật hiển thị Section tương ứng
            document.querySelectorAll('.news-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`section-${feedId}`).classList.add('active');

            // Render lại để cập nhật đúng trạng thái nút See More của Tab đó
            renderFeed(feedId);
        }

        // Xử lý sự kiện bấm nút See More
        function loadMoreNews() {
            // Tăng số lượng hiển thị thêm 10 bài cho tab hiện tại
            displayCounts[currentTab] += 10;
            renderFeed(currentTab);
        }

        // Làm mới dữ liệu
        function refreshAllFeeds() {
            // Reset lại số lượng hiển thị về 10 bài như ban đầu cho tất cả các tab
            FEEDS.forEach(feed => {
                displayCounts[feed.id] = 10;
            });
            fetchAllFeeds();
        }

        // Chạy ứng dụng khi trang load xong
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Deck - Trạm Điều Hành Dự Án</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0f132a; 
            --header-bg: #1e2548;
            --column-bg: rgba(22, 27, 53, 0.65); /* Nền cột bán trong suốt hitech */
            --card-bg: #161b35;
            --card-border: rgba(99, 102, 241, 0.28);
            --card-hover-border: #22d3ee;
            
            --accent-indigo: #818cf8; 
            --accent-cyan: #22d3ee;   
            --accent-magenta: #f472b6; 
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            
            --color-active: #10b981;
            --color-coming: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2.5rem 1.5rem;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- BACKGROUND SYSTEM (WEBNET STYLE) --- */
        .cyber-bg-system {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .digital-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.22) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.22) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .mouse-glow-pointer {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            top: -9999px;
            left: -9999px;
            transition: transform 0.08s ease-out;
            will-change: transform, top, left;
        }
        .network-stream {
            position: absolute;
            height: 2px;
            width: 400px;
            filter: drop-shadow(0 0 10px var(--accent-indigo));
            opacity: 0.8;
        }
        .line-1 { top: 25%; left: -400px; background: linear-gradient(90deg, transparent, var(--accent-indigo), transparent); animation: sweepRight 6s linear infinite; }
        .line-2 { top: 75%; right: -400px; background: linear-gradient(90deg, transparent, var(--accent-magenta), transparent); animation: sweepLeft 9s linear infinite; }
        
        @keyframes sweepRight { 0% { left: -400px; } 100% { left: 100%; } }
        @keyframes sweepLeft { 0% { right: -400px; } 100% { right: 100%; } }

        /* --- CONTAINER --- */
        .container {
            max-width: 1400px; /* Nới rộng container để vừa không gian 3 cột dàn ngang */
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        /* BACK BUTTON & HEADER */
        .back-to-hub {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: all 0.2s ease;
            width: fit-content;
        }
        .back-to-hub:hover {
            color: #fff;
            transform: translateX(-3px);
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--header-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem 2rem;
            border-radius: 16px;
            margin-bottom: 2.5rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .header-title h1 {
            font-size: 1.65rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .header-title h1 i {
            color: var(--accent-cyan);
            filter: drop-shadow(0 0 8px var(--accent-cyan));
        }
        .header-title p {
            font-size: 0.92rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }
        .counter-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-cyan);
            text-align: right;
        }
        .counter-label {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* --- TRELLO MULTI-COLUMN BOARD LAYOUT --- */
        .trello-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Định hình cứng 3 cột cân bằng */
            gap: 1.75rem;
            align-items: start;
            flex-grow: 1;
        }

        /* COLUMN BOX */
        /* --- TỐI ƯU NỀN VÀ VIỀN CHO GROUP TRÔNG RÕ RÀNG HƠN --- */
        .trello-column {
            background: rgba(16, 20, 44, 0.85); /* Tăng độ đậm và mờ của nền để block text nổi bật hoàn toàn */
            border: 1px solid rgba(99, 102, 241, 0.35); /* Làm rõ đường viền bao quanh group bằng màu Indigo của Webnet */
            border-radius: 18px;
            padding: 1.5rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
        }

        .column-header {
            font-size: 1.05rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-cyan); /* Đổi sang màu Cyan để tiêu đề cột sáng và dễ quét mắt hơn */
            padding-bottom: 0.75rem;
            border-bottom: 2px solid rgba(34, 211, 238, 0.3); /* Đường gạch chân rõ nét đồng bộ */
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .column-header i {
            color: var(--accent-cyan);
        }

        /* CARDS VERTICAL LIST INSIDE COLUMN */
        .cards-vertical-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* COCKPIT CARD */
        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 1.4rem;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            cursor: pointer;
            transition: all 0.22s ease-in-out;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .tool-card.coming-soon {
            cursor: not-allowed;
            opacity: 0.55;
            border-style: dashed;
        }
        .tool-card:not(.coming-soon):hover {
            transform: translateY(-3px);
            border-color: var(--card-hover-border);
            box-shadow: 0 10px 25px rgba(34, 211, 238, 0.18);
            background: #1c2244;
        }

        .card-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .icon-wrapper {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            font-size: 1.1rem;
        }
        .tool-card:not(.coming-soon):hover .icon-wrapper {
            background: var(--accent-cyan);
            color: var(--bg-main);
            border-color: transparent;
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .status-dot {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(0, 0, 0, 0.4);
        }
        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        /* --- ĐỒNG BỘ TYPOGRAPHY THEO TỶ LỆ HÀI HÒA CỦA WEBNET --- */
        .card-meta h3 {
            font-size: 1.15rem; /* Giảm từ 1.35rem về mức chuẩn Webnet, chữ gọn gàng trên 1-2 dòng */
            font-weight: 600;
            color: #fff;
            line-height: 1.4;
        }

        .card-meta p {
            font-size: 0.85rem; /* Giảm từ 0.92rem giúp văn bản thanh thoát, tăng khoảng trống cho Card */
            color: var(--text-muted);
            line-height: 1.5;
            margin-top: 0.5rem;
        }

        .card-action-arrow {
            margin-top: auto;
            text-align: right;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .tool-card:not(.coming-soon):hover .card-action-arrow {
            color: var(--accent-cyan);
            transform: translateX(4px);
        }

        footer {
            text-align: center;
            margin-top: auto;
            padding: 2.5rem 0 1rem 0;
            color: #475569;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* RESPONSIVE: CHUYỂN THÀNH 1 CỘT TRÊN MOBILE ĐỂ TRÁNH BỊ BÓP NGHẸT */
        @media (max-width: 1024px) {
            .trello-board { grid-template-columns: 1fr; gap: 2rem; }
            header { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- DIGITAL WEBNET BACKGROUND EFFECT -->
    <div class="cyber-bg-system">
        <div class="digital-grid"></div>
        <div class="mouse-glow-pointer" id="mouseGlow"></div>
        <div class="network-stream line-1"></div>
        <div class="network-stream line-2"></div>
    </div>

    <div class="container">
        <!-- BACK TO WEB NET PAGE -->
        <a href="https://ntkientn.github.io/mypage/webnet.html" class="back-to-hub">
            <i class="fa-solid fa-arrow-left"></i> Kien WebNet 
        </a>

        <!-- BOARD HEADER -->
        <header>
            <div class="header-title">
                <h1><i class="fa-solid fa-sliders"></i> PM Deck</h1>
                <p>Trạm điều khiển quy trình, trợ lý cố vấn & ứng dụng tính toán PM thực chiến.</p>
            </div>
            <div class="header-counter">
                <div class="counter-value" id="activeCounter">0/0</div>
                <div class="counter-label">Modules Ready</div>
            </div>
        </header>

        <!-- TRELLO COLUMN BOARD PLATFORM -->
        <main class="trello-board" id="trelloBoard">
            <!-- Inject tự động 3 cột từ JS -->
        </main>

        <footer>
            <p>&copy; 2026 PM Deck. Tailored for Professional Project Manager. Nguyen Trung Kien.</p>
        </footer>
    </div>

    <script>
        // CẤU TRÚC DỮ LIỆU ĐƯỢC GIỮ NGUYÊN ĐỂ BẠN DỄ DÀNG BẢO TRÌ/THÊM APP SAU NÀY
        const pmModules = [
            // GROUP 1: SYSTEM ADVISORS
            {
                title: "PM Tool Advisor",
                description: "Hệ thống AI phân tích và đưa ra giải pháp lựa chọn bộ công cụ tối ưu theo đặc thù dự án.",
                url: "https://ntkientn.github.io/mypage/pmdeck/pmtooladvisor.html",
                icon: "fa-wand-magic-sparkles",
                group: "advisors",
                status: "active"
            },
            {
                title: "Process Guide Lookup",
                description: "Tra cứu nhanh quy trình chuẩn PMP/Agile, bộ hướng dẫn kiểm soát rủi ro và quản lý stakeholder.",
                url: "#",
                icon: "fa-book-bookmark",
                group: "advisors",
                status: "coming"
            },

            // GROUP 2: INTERACTIVE APPS
            {
                title: "Earned Value Control (EV/PV/AC)",
                description: "Ứng dụng tương tác tính toán nhanh các chỉ số sức khỏe dự án: CV, SV, CPI, SPI và dự báo EAC.",
                url: "#",
                icon: "fa-calculator",
                group: "apps",
                status: "coming"
            },
            {
                title: "Agile Velocity & Burndown",
                description: "Mô phỏng và đo lường tốc độ phân phối của Team, tối ưu hóa kế hoạch Sprint kế tiếp.",
                url: "#",
                icon: "fa-chart-line",
                group: "apps",
                status: "coming"
            },
            {
                title: "SWOT Matrix Analytics",
                description: "Ma trận tương tác phân tích Điểm mạnh, Điểm yếu, Cơ hội & Thách thức cho dự án số hóa.",
                url: "https://ntkientn.github.io/mypage/pmdeck/SWOT.html",
                icon: "fa-table-cells-large",
                group: "apps",
                status: "coming"
            },
            {
                title: "Estimation Matrix Method",
                description: "Công cụ hỗ trợ định lượng estimation: 3-Point Estimate, PERT, và Planning Poker.",
                url: "#",
                icon: "fa-compass-drafting",
                group: "apps",
                status: "coming"
            },

            // GROUP 3: KNOWLEDGE & REFERENCE
            {
                title: "PM Tools Reference",
                description: "Thư viện tổng hợp, đánh giá và phân loại ưu-nhược điểm các phần mềm quản trị phổ biến.",
                url: "https://ntkientn.github.io/mypage/pmdeck/pmtoolsref.html",
                icon: "fa-layer-group",
                group: "reference",
                status: "active"
            },
            {
                title: "Artifacts & Templates",
                description: "Kho lưu trữ biểu mẫu, checklist bàn giao và tài liệu quản trị tinh gọn tải về ngay.",
                url: "#",
                icon: "fa-folder-open",
                group: "reference",
                status: "coming"
            }
        ];

        // CONFIG ĐỊNH DANH 3 CỘT TRELLO
        const groupConfigs = {
            advisors: { title: "System Advisors", icon: "fa-network-wired" },
            apps: { title: "Interactive Apps", icon: "fa-laptop-code" },
            reference: { title: "References base", icon: "fa-database" }
        };

        // HIỆU ỨNG MOUSE GLOW
        const mouseGlow = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            mouseGlow.style.left = e.clientX + 'px';
            mouseGlow.style.top = e.clientY + 'px';
        });

        function launchModule(url, status) {
            if (status === 'coming') return;
            window.location.href = url;
        }

        // HÀM BUILD BOARD 3 CỘT DÀN NGANG
        function buildTrelloBoard() {
            const board = document.getElementById('trelloBoard');
            board.innerHTML = '';

            // Cập nhật bộ đếm trên Header
            const total = pmModules.length;
            const activeCount = pmModules.filter(m => m.status === 'active').length;
            document.getElementById('activeCounter').innerText = `${activeCount}/${total}`;

            // Sinh cấu trúc 3 cột cố định dựa trên cấu hình groupConfigs
            Object.keys(groupConfigs).forEach(groupKey => {
                const columnModules = pmModules.filter(m => m.group === groupKey);

                // Tạo đối tượng Cột (Column List)
                const columnEl = document.createElement('div');
                columnEl.className = 'trello-column';
                
                // Tiêu đề cột
                let columnHTML = `
                    <div class="column-header">
                        <i class="fa-solid ${groupConfigs[groupKey].icon}"></i> ${groupConfigs[groupKey].title}
                    </div>
                    <div class="cards-vertical-list">
                `;

                // Vòng lặp chèn các thẻ Card theo chiều dọc của từng Cột
                columnModules.forEach(mod => {
                    const isActive = mod.status === 'active';
                    const statusText = isActive ? "Ready" : "Coming Soon";
                    const statusColor = isActive ? "var(--color-active)" : "var(--color-coming)";

                    columnHTML += `
                        <div class="tool-card ${isActive ? '' : 'coming-soon'}" onclick="launchModule('${mod.url}', '${mod.status}')">
                            <div class="card-top-bar">
                                <div class="icon-wrapper">
                                    <i class="fa-solid ${mod.icon}"></i>
                                </div>
                                <div class="status-dot" style="color: ${statusColor}; border: 1px solid ${statusColor}33;">
                                    <span class="dot" style="background-color: ${statusColor}; box-shadow: 0 0 6px ${statusColor};"></span>
                                    ${statusText}
                                </div>
                            </div>
                            <div class="card-meta">
                                <h3>${mod.title}</h3>
                                <p class="card-desc">${mod.description}</p>
                            </div>
                            <div class="card-action-arrow">
                                ${isActive ? '<i class="fa-solid fa-arrow-right-long"></i>' : '<i class="fa-solid fa-lock" style="font-size:11px; opacity:0.5;"></i>'}
                            </div>
                        </div>
                    `;
                });

                columnHTML += `</div>`; // Đóng lớp cards-vertical-list
                columnEl.innerHTML = columnHTML;
                board.appendChild(columnEl);
            });
        }

        window.addEventListener('DOMContentLoaded', buildTrelloBoard);
    </script>
</body>
</html>

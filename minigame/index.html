            <button onclick="launchGame('shooter')" class="group text-left bg-gradient-to-r from-red-900/40 to-orange-900/30 border-2 border-red-500/30 rounded-2xl hover:border-red-400 hover:shadow-[0_0_30px_rgba(239,68,68,0.3)] transition-all duration-300 cursor-pointer overflow-hidden flex flex-row h-36 items-center backdrop-blur-md">
                <div class="w-1/3 h-full flex-shrink-0 border-r-2 border-red-500/20 relative flex items-center justify-center overflow-hidden bg-gradient-to-br from-red-950/60 to-slate-900/80">
                    <div class="absolute top-2 left-2 w-8 h-[1px] bg-gradient-to-r from-yellow-400 to-transparent transform -rotate-45 opacity-60"></div>

                </div>

                    <div>

                            <i class="fa-solid fa-jet-fighter text-red-400 text-xs"></i> 4. Chiến Đấu Cơ Siêu Hạng

                        <p class="text-[12px] text-red-200/80 mt-1 leading-relaxed line-clamp-2">Lái chiến cơ nã đạn hủy diệt đĩa bay UFO, phải thật khéo léo để đạt điểm cao.</p>

                    <span class="text-[10px] font-bold font-digital tracking-widest text-white bg-red-600 px-2 py-0.5 rounded-full w-max shadow-sm">DRAG TO FLY</span>

            <button onclick="launchGame('snake')" class="group text-left bg-gradient-to-r from-emerald-900/40 to-teal-900/30 border-2 border-emerald-500/30 rounded-2xl hover:border-emerald-400 hover:shadow-[0_0_30px_rgba(16,185,129,0.3)] transition-all duration-300 cursor-pointer overflow-hidden flex flex-row h-36 items-center backdrop-blur-md">
                <div class="w-1/3 h-full flex-shrink-0 border-r-2 border-emerald-500/20 relative flex items-center justify-center overflow-hidden bg-gradient-to-br from-emerald-950/60 to-slate-900/80">
                    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#10b981_1.5px,transparent_1px)] [background-size:10px_10px]"></div>

                    <div>

                        </h3>
                        <p class="text-[12px] text-emerald-200/80 mt-1 leading-relaxed line-clamp-2">Điều khiển rắn ăn các viên năng lượng để dài ra nhanh chóng.</p>
                    </div>

            <button onclick="launchGame('breaker')" class="group text-left bg-gradient-to-r from-pink-900/40 to-rose-900/30 border-2 border-pink-500/30 rounded-2xl hover:border-pink-400 hover:shadow-[0_0_30px_rgba(244,63,94,0.3)] transition-all duration-300 cursor-pointer overflow-hidden flex flex-row h-36 items-center backdrop-blur-md">
                <div class="w-1/3 h-full flex-shrink-0 border-r-2 border-pink-500/20 relative flex items-center justify-center overflow-hidden bg-gradient-to-br from-pink-950/60 to-slate-900/80">
                    <div class="absolute inset-0 opacity-15 bg-[linear-gradient(to_right,#f43f5e_1px,transparent_1px)] bg-[size:8px]"></div>

                    <div>
                        <h3 class="font-extrabold text-white text-base group-hover:text-pink-300 transition-colors flex items-center gap-2">
                            <i class="fa-solid fa-shapes text-pink-400 text-xs"></i> 6. Phá Hủy Tường Gạch
                        </h3>
                        <p class="text-[12px] text-pink-200/80 mt-1 leading-relaxed line-clamp-2">Điều khiển thanh sáng đỡ bóng, bắn phá các bức tường gạch Neon rực rỡ.</p>
                    </div>
                    <span class="text-[10px] font-bold font-digital tracking-widest text-white bg-pink-600 px-2 py-0.5 rounded-full w-max shadow-sm">DRAG TO MOVE</span>
                </div>

    <!-- GAME VIEW -->
    <div id="game-view" class="relative z-50 w-full max-w-[440px] h-[100dvh] mx-auto flex flex-col justify-between pt-4 pb-3 px-4 hidden bg-[#04050e]">
        <div class="flex justify-between items-center bg-slate-900/90 border border-slate-800 px-4 py-3 rounded-xl backdrop-blur-md shadow-lg sticky top-0 z-50">
            <button onclick="backToDashboard()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black text-xs uppercase tracking-widest px-4 py-2 rounded-lg cursor-pointer transition-colors active:scale-95 shadow-md flex items-center gap-1.5">
                <i class="fa-solid fa-house text-[10px]"></i> HUB
            </button>
            <div class="flex gap-4 font-digital text-sm tracking-wider">
                <div>SCORE: <span id="live-score" class="text-cyan-400 font-bold">0</span></div>
                <div>BEST: <span id="high-score" class="text-amber-400 font-bold">0</span></div>
            </div>
        </div>

        <div class="flex-1 my-3 bg-slate-950 border border-slate-800 rounded-2xl overflow-hidden relative shadow-[0_10px_30px_rgba(0,0,0,0.8)] flex items-center justify-center" id="canvas-container">
            <canvas id="gameCanvas" width="400" height="600" class="w-full h-full object-contain block"></canvas>
            
            <div id="game-overlay" class="absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center text-center p-6 space-y-5 z-20">
                <h2 id="overlay-title" class="text-2xl font-black tracking-wider text-white">TÊN TRÒ CHƠI</h2>
                <p id="overlay-desc" class="text-xs text-slate-400 max-w-xs leading-relaxed">Hướng dẫn trò chơi.</p>
                <button id="start-btn" class="bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-black text-xs uppercase tracking-widest px-6 py-3 rounded-xl shadow-lg active:scale-95 cursor-pointer transition-transform">
                    KÍCH HOẠT MÀN CHƠI
                </button>
            </div>
        </div>
        
        <p class="text-center text-[10px] text-slate-500 italic font-mono tracking-wide">KIEN'S ARCADE - SECURITY PROTOCOL ENFORCED</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentActiveGame = null;
        let gameLoopId = null;
        let score = 0;
        let currentHighScore = 0;
        let isGameRunning = false;
        let particles = [];

        // Hệ thống phát hiện vuốt màn hình (Swipe Detection) cho 2048
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', e => {
            if (currentActiveGame !== 'game2048' || !isGameRunning) return;
            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.max(Math.abs(diffX), Math.abs(diffY)) < 25) return;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) handle2048Move('right'); else handle2048Move('left');
            } else {
                if (diffY > 0) handle2048Move('down'); else handle2048Move('up');
            }
        }, { passive: true });

        window.addEventListener('keydown', e => {
            if (!isGameRunning) return;
            if (currentActiveGame === 'game2048') {
                if(e.code === 'ArrowLeft') handle2048Move('left');
                if(e.code === 'ArrowRight') handle2048Move('right');
                if(e.code === 'ArrowUp') handle2048Move('up');
                if(e.code === 'ArrowDown') handle2048Move('down');
            }
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
        });

        function launchGame(gameId) {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            currentActiveGame = gameId;
            score = 0;
            document.getElementById('live-score').innerText = score;
            currentHighScore = localStorage.getItem(`highscore_v2_${gameId}`) || 0;
            document.getElementById('high-score').innerText = currentHighScore;
            
            // KHÓA CUỘN THÔNG MINH
            document.body.style.touchAction = 'none';
            document.body.classList.add('overflow-hidden');
            
            setupOverlayUI(gameId);
        }

        function backToDashboard() {
            isGameRunning = false;
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            
            // GIẢI PHÓNG THANH CUỘN MÀN HÌNH CHÍNH
            document.body.style.touchAction = 'auto';
            document.body.classList.remove('overflow-hidden');
            
            canvas.onmousedown = null; canvas.ontouchstart = null;
            canvas.onmousemove = null; canvas.ontouchmove = null;
            window.onmouseup = null; window.ontouchend = null;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
        }

        function updateScore(points) {
            score = points;
            document.getElementById('live-score').innerText = score;
            if (score > currentHighScore) {
                currentHighScore = score;
                document.getElementById('high-score').innerText = currentHighScore;
                localStorage.setItem(`highscore_v2_${currentActiveGame}`, currentHighScore);
            }
        }

        function triggerGameOver() {
            isGameRunning = false;
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            
            canvas.ontouchstart = null; canvas.ontouchmove = null; canvas.ontouchend = null;
            canvas.onmousemove = null; canvas.onmousedown = null;
            window.onmouseup = null; window.ontouchend = null;

            const overlay = document.getElementById('game-overlay');
            const title = document.getElementById('overlay-title');
            const desc = document.getElementById('overlay-desc');
            
            title.innerText = "MISSION FAILED";
            title.className = "text-3xl font-black text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            desc.innerHTML = `Điểm số của con đạt được: <span class="text-white font-bold text-base">${score}</span><br>Hãy kích hoạt lại hệ thống để thử lại nhé!`;
            overlay.classList.remove('hidden');
        }

        function setupOverlayUI(gameId) {
            const overlay = document.getElementById('game-overlay');
            const title = document.getElementById('overlay-title');
            const desc = document.getElementById('overlay-desc');
            const startBtn = document.getElementById('start-btn');
            overlay.classList.remove('hidden');
            
            if(gameId === 'memory') {
                title.innerText = "LẬT THẺ TRÍ NHỚ"; title.className = "text-2xl font-black text-purple-400";
                desc.innerText = "Chạm vào các ô vuông mạch điện để lật thẻ. Tìm ra 2 hình giống nhau liên tiếp. Giới hạn: Tối đa 30 lượt lật bài!";
                startBtn.onclick = () => startMemoryGame();
            } else if(gameId === 'bird') {
                title.innerText = "CYBER MECHA BIRD"; title.className = "text-2xl font-black text-cyan-400";
                desc.innerText = "CHẠM VÀO MÀN HÌNH để chú chim cơ khí đập cánh bay lên. Né tránh các rặng cột năng lượng Laser Hồng Neon.";
                startBtn.onclick = () => startBirdGame();
            } else if(gameId === 'game2048') {
                title.innerText = "CYBER MA TRẬN 2048"; title.className = "text-2xl font-black text-amber-400";
                desc.innerText = "VUỐT MÀN HÌNH (Lên, Xuống, Trái, Phải) để dồn các ô số. Hai ô số giống nhau chập lại sẽ nhân đôi. Đạt ô 2048 để thắng!";
                startBtn.onclick = () => start2048Game();
            } else if(gameId === 'shooter') {
                title.innerText = "CHIẾN CƠ VŨ TRỤ"; title.className = "text-2xl font-black text-red-400";
                desc.innerText = "ẤN GIỮ & KÉO ngón tay trực tiếp lên chiến cơ để di chuyển né tránh quái vật. Hệ thống vũ khí Laser tối tân sẽ tự động bắn trả!";
                startBtn.onclick = () => startShooterGame();
            } else if(gameId === 'snake') {
                title.innerText = "RẮN SĂN MỒI CYBER"; title.className = "text-2xl font-black text-emerald-400";
                desc.innerText = "Sử dụng các cú VUỐT NHẸ MÀN HÌNH (Lên, Xuống, Trái, Phải) để điều khiển hướng đi của Rắn. Né các bức tường năng lượng!";
                startBtn.onclick = () => startSnakeGame();
            } else if(gameId === 'breaker') {
                title.innerText = "PHÁ HỦY BỨC TƯỜNG"; title.className = "text-2xl font-black text-pink-400";
                desc.innerText = "CHẠM & DI CHUYỂN ngón tay ở nửa dưới màn hình để di chuyển tấm khiên chắn đỡ bóng, đập vỡ toàn bộ các khối lõi năng lượng Neon!";
                startBtn.onclick = () => startBreakerGame();
            }
        }

        function createExplosion(x, y, color, count=10) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 3 + 1, color: color, alpha: 1
                });
            }
        }

        function updateAndRenderParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                if (p.alpha <= 0) { particles.splice(i, 1); } else {
                    ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                    ctx.shadowBlur = 5; ctx.shadowColor = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
                }
            }
        }

        // =====================================================================
        // GAME 1: LẬT THẺ NHỚ (CẬP NHẬT: EMOJI DỄ THƯƠNG & FIX LỖI BEST SCORE)
        // =====================================================================
        let memoryCards = [];
        let firstCard = null, secondCard = null;
        let lockBoard = false;
        let memoryTimer = null;
        let memorySeconds = 0;
        let memoryTurns = 0; 
        let memoryCurrentScore = 1000; // Dùng biến riêng để cô lập điểm, không ghi đè lên HUD tổng khi đang chơi

        function startMemoryGame() {
            document.getElementById('game-overlay').classList.add('hidden');
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (memoryTimer) clearInterval(memoryTimer);
            
            isGameRunning = true; 
            particles = [];
            memorySeconds = 0;
            memoryTurns = 0;
            memoryCurrentScore = 1000; // Điểm trần bắt đầu từ 1000, chỉ giảm nội bộ

            // KHÔNG GỌI updateScore(1000) ở đây nữa để tránh lỗi HUD tổng nhận nhầm Best Score 1000

            // Cập nhật bộ đếm thời gian: Cứ 1 giây trôi qua trừ 2 điểm
            memoryTimer = setInterval(() => {
                if (isGameRunning) {
                    memorySeconds++;
                    if (memoryCurrentScore > 100) { // Giữ tối thiểu 100 điểm khuyến khích cho bé
                        memoryCurrentScore -= 2;
                    }
                }
            }, 1000);

            // BỘ THẺ EMOJI SIÊU DỄ THƯƠNG DÀNH CHO TRẺ EM (10 cặp con vật và đồ ăn ngọt rực rỡ màu sắc)
            const cuteEmojis = ['🐼', '🐱', '🦊', '🦁', '🐰', '🦄', '🍦', '🍬', '🍩', '🍓'];
            let deck = [...cuteEmojis, ...cuteEmojis];
            
            // Xáo bài ngẫu nhiên
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }

            // Tạo ma trận thẻ bài phù hợp kích thước canvas
            memoryCards = [];
            const cardW = 55, cardH = 75, gap = 12, offsetTop = 85, offsetLeft = 14;
            
            for (let i = 0; i < deck.length; i++) {
                let row = Math.floor(i / 5);
                let col = i % 5;
                memoryCards.push({
                    x: col * (cardW + gap) + offsetLeft,
                    y: row * (cardH + gap) + offsetTop,
                    w: cardW,
                    h: cardH,
                    emoji: deck[i], // Lưu trữ emoji dễ thương
                    isFlipped: false,
                    isMatched: false
                });
            }

            firstCard = null; secondCard = null; lockBoard = false;

            // Xử lý click lật bài
            canvas.onclick = (e) => {
                if (!isGameRunning || lockBoard) return;
                let rect = canvas.getBoundingClientRect();
                let mx = (e.clientX - rect.left) * (canvas.width / rect.width);
                let my = (e.clientY - rect.top) * (canvas.height / rect.height);

                for (let card of memoryCards) {
                    if (!card.isFlipped && !card.isMatched && mx > card.x && mx < card.x + card.w && my > card.y && my < card.y + card.h) {
                        card.isFlipped = true;
                        createExplosion(card.x + card.w/2, card.y + card.h/2, '#ff73b9', 6); // Hiệu ứng pháo bông màu hồng dễ thương

                        if (!firstCard) {
                            firstCard = card;
                        } else {
                            secondCard = card;
                            lockBoard = true;
                            memoryTurns++; 
                            
                            // Mỗi lượt lật bài sai/đúng đều trừ 10 điểm để kích thích bé nhớ chính xác hơn
                            if (memoryCurrentScore > 100) memoryCurrentScore -= 10;

                            // Kiểm tra trùng khớp
                            if (firstCard.emoji === secondCard.emoji) {
                                firstCard.isMatched = true;
                                secondCard.isMatched = true;
                                createExplosion(firstCard.x + firstCard.w/2, firstCard.y + firstCard.h/2, '#10b981', 12);
                                createExplosion(secondCard.x + secondCard.w/2, secondCard.y + secondCard.h/2, '#10b981', 12);
                                firstCard = null; secondCard = null; lockBoard = false;
                                
                                // KHI PHÁ ĐẢO THÀNH CÔNG
                                if (memoryCards.every(c => c.isMatched)) {
                                    isGameRunning = false;
                                    clearInterval(memoryTimer);
                                    
                                    // GHI NHẬN ĐIỂM SỐ THỰC TẾ CUỐI CÙNG LÊN HUD TỔNG VÀ LOCALSTORAGE
                                    score = memoryCurrentScore;
                                    updateScore(score); // Lúc này mới cập nhật điểm thật để tính Best Score chính xác!

                                    let currentBest = localStorage.getItem('arcade_best_1') ? parseInt(localStorage.getItem('arcade_best_1')) : 0;
                                    if (score > currentBest) {
                                        localStorage.setItem('arcade_best_1', score);
                                    }

                                    setTimeout(() => {
                                        document.getElementById('overlay-title').innerText = "BÉ THẬT THÔNG MINH!";
                                        document.getElementById('overlay-desc').innerText = `Chúc mừng bé đã tìm hết các cặp thú cưng dễ thương!\n⏱ Thời gian: ${memorySeconds} giây\n🔄 Số lần lật: ${memoryTurns} lần\n🏆 Điểm số đạt được: ${score} điểm!`;
                                        document.getElementById('game-overlay').classList.remove('hidden');
                                    }, 300);
                                }
                            } else {
                                // Lật sai thì úp lại sau 0.8s
                                setTimeout(() => {
                                    firstCard.isFlipped = false;
                                    secondCard.isFlipped = false;
                                    firstCard = null; secondCard = null; lockBoard = false;
                                }, 800);
                            }
                        }
                        break;
                    }
                }
            };

            canvas.onmousemove = null; canvas.ontouchmove = null;

            function loop() {
                if (!isGameRunning) return;
                ctx.fillStyle = '#060813'; ctx.fillRect(0, 0, canvas.width, canvas.height);

                // HIỂN THỊ THÔNG SỐ HUD TRÊN TRẦN CANVAS (Giao diện Bo góc thân thiện)
                ctx.fillStyle = '#94a3b8';
                ctx.font = '600 13px "Plus Jakarta Sans"';
                ctx.fillText(`🔄 LƯỢT LẬT: ${memoryTurns}`, 16, 42);
                ctx.fillText(`⏱ THỜI GIAN: ${memorySeconds}s`, 130, 42);
                ctx.fillStyle = '#f43f5e';
                ctx.fillText(`⭐ ĐIỂM SỐ: ${memoryCurrentScore}`, canvas.width - 110, 42);

                // Vẽ các thẻ bài
                for (let card of memoryCards) {
                    ctx.save();
                    if (card.isMatched || card.isFlipped) {
                        // Thẻ MỞ: Nền trắng hồng dễ thương, viền bo mịn màng
                        ctx.fillStyle = '#fff1f2';
                        ctx.strokeStyle = '#fda4af';
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.roundRect(card.x, card.y, card.w, card.h, 8); ctx.fill(); ctx.stroke();

                        // Vẽ Emoji động vật/đồ ăn đầy đủ màu sắc gốc cực đẹp ở tâm card
                        ctx.font = '32px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(card.emoji, card.x + card.w / 2, card.y + card.h / 2 + 2); // Kéo xuống xíu cho cân đối
                    } else {
                        // Thẻ ÚP: Màu xanh pastel kẹo ngọt mềm mại kết hợp hình ngôi sao vàng nhỏ ở giữa
                        ctx.fillStyle = '#1e293b';
                        ctx.strokeStyle = '#38bdf8';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.roundRect(card.x, card.y, card.w, card.h, 8); ctx.fill(); ctx.stroke();

                        // Vẽ hình ngôi sao dễ thương trang trí ở mặt sau thẻ úp
                        ctx.fillStyle = '#facc15';
                        ctx.font = '900 18px "Font Awesome 6 Free"';
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText('\uf005', card.x + card.w / 2, card.y + card.h / 2); // Mã Unicode của ngôi sao 'star'
                    }
                    ctx.restore();
                }

                updateAndRenderParticles();
                gameLoopId = requestAnimationFrame(loop);
            }
            loop();
        }

        // =====================================================================
        // GAME 2: CYBER MECHA BIRD
        // =====================================================================
        let bird, pipes;
        const bGravity = 0.32, bJump = -6.2;

        function startBirdGame() {
            document.getElementById('game-overlay').classList.add('hidden');
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            isGameRunning = true; particles = []; pipes = [];
            bird = { x: 60, y: 250, w: 34, h: 26, velocity: 0, wingAngle: 0 };
            let pipeTimer = 0, bScore = 0;

            function jump() {
                if(!isGameRunning) return;
                bird.velocity = bJump; bird.wingAngle = 0.5;
                for(let i=0; i<5; i++) {
                    particles.push({ x: bird.x - 2, y: bird.y + bird.h/2, vx: -Math.random()*2 - 1, vy: (Math.random()-0.5)*4, size: Math.random()*2.5+1, color: '#38bdf8', alpha: 1 });
                }
            }
            canvas.onmousedown = () => jump();
            canvas.ontouchstart = (e) => { e.preventDefault(); jump(); };

            function loop() {
                if (!isGameRunning) return;
                ctx.fillStyle = '#04050d'; ctx.fillRect(0, 0, canvas.width, canvas.height);

                bird.velocity += bGravity; bird.y += bird.velocity;
                if (bird.velocity > 0) bird.wingAngle = Math.max(-0.4, bird.wingAngle - 0.04);
                if (bird.y + bird.h > canvas.height || bird.y < 0) { triggerGameOver(); return; }

                if (Math.random() > 0.5) particles.push({ x: bird.x - 2, y: bird.y + bird.h/2, vx: -1.5, vy: (Math.random()-0.5)*1, size: Math.random()*2+1, color: '#22d3ee', alpha: 0.7 });

                ctx.save(); ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
                ctx.rotate(Math.min(Math.max(bird.velocity * 0.05, -0.3), 0.6));
                ctx.shadowBlur = 10; ctx.shadowColor = '#22d3ee';
                
                ctx.save(); ctx.translate(-4, 1); ctx.rotate(bird.wingAngle);
                ctx.fillStyle = '#0284c7'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-12,-12); ctx.lineTo(-4,-18); ctx.lineTo(5,-3); ctx.closePath(); ctx.fill();
                ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1; ctx.stroke(); ctx.restore();

                ctx.fillStyle = '#0ea5e9'; ctx.beginPath(); ctx.ellipse(0,0, bird.w/2, bird.h/2, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.moveTo(bird.w/2 - 2, -4); ctx.lineTo(bird.w/2 + 8, 0); ctx.lineTo(bird.w/2 - 2, 4); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(5, -3, 3.5, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                pipeTimer++;
                if (pipeTimer > 115) {
                    let gap = 140, minH = 50, maxH = canvas.height - gap - minH - 80;
                    let topH = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
                    pipes.push({ x: canvas.width, topH: topH, botY: topH + gap, w: 50, passed: false });
                    pipeTimer = 0;
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    let p = pipes[i]; p.x -= 2.4;
                    if (p.x + p.w < 0) { pipes.splice(i, 1); continue; }

                    ctx.fillStyle = '#1e1b4b'; ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 1.5;
                    ctx.fillRect(p.x, 0, p.w, p.topH); ctx.strokeRect(p.x, 0, p.w, p.topH);
                    ctx.fillRect(p.x, p.botY, p.w, canvas.height - p.botY); ctx.strokeRect(p.x, p.botY, p.w, canvas.height - p.botY);

                    ctx.save(); ctx.shadowBlur = 12; ctx.shadowColor = '#f43f5e'; ctx.fillStyle = '#f43f5e';
                    ctx.fillRect(p.x-2, p.topH-7, p.w+4, 7); ctx.fillRect(p.x-2, p.botY, p.w+4, 7); ctx.restore();

                    if (bird.x + 2 < p.x + p.w && bird.x + bird.w - 2 > p.x) {
                        if (bird.y + 2 < p.topH || bird.y + bird.h - 2 > p.botY) { triggerGameOver(); return; }
                    }
                    if (!p.passed && p.x + p.w < bird.x) { bScore++; p.passed = true; updateScore(bScore); }
                }
                updateAndRenderParticles();
                gameLoopId = requestAnimationFrame(loop);
            }
            loop();
        }

        // =====================================================================
        // GAME 3: MA TRẬN SỐ 2048
        // =====================================================================
        let grid2048, score2048;
        const size2048 = 4;

        function start2048Game() {
            document.getElementById('game-overlay').classList.add('hidden');
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            isGameRunning = true; particles = []; canvas.onmousedown = null; canvas.ontouchstart = null;
            score2048 = 0;
            init2048Grid();
            draw2048();
        }

        function init2048Grid() {
            grid2048 = Array(size2048).fill(null).map(() => Array(size2048).fill(0));
            add2048Tile(); add2048Tile();
        }

        function add2048Tile() {
            let emptyCells = [];
            for(let r=0; r<size2048; r++) {
                for(let c=0; c<size2048; c++) { if (grid2048[r][c] === 0) emptyCells.push({r, c}); }
            }
            if (emptyCells.length > 0) {
                let cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid2048[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function draw2048() {
            if (currentActiveGame !== 'game2048') return;
            ctx.fillStyle = '#05060f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const boardW = 340, pad = 12;
            const tileW = (boardW - (size2048 + 1) * pad) / size2048;
            const startX = (canvas.width - boardW) / 2;
            const startY = (canvas.height - boardW) / 2;

            ctx.fillStyle = '#0d1224'; ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(startX, startY, boardW, boardW, 14); ctx.fill(); ctx.stroke();

            const colors = {
                2: {bg: '#1e293b', txt: '#f8fafc', glow: 0}, 4: {bg: '#334155', txt: '#f8fafc', glow: 0},
                8: {bg: '#1e3a8a', txt: '#93c5fd', glow: 5}, 16: {bg: '#2563eb', txt: '#ffffff', glow: 8},
                32: {bg: '#065f46', txt: '#a7f3d0', glow: 6}, 64: {bg: '#059669', txt: '#ffffff', glow: 10},
                128: {bg: '#78350f', txt: '#fde68a', glow: 8}, 256: {bg: '#d97706', txt: '#ffffff', glow: 14},
                512: {bg: '#701a75', txt: '#fbcfe8', glow: 12}, 1024: {bg: '#2e1065', txt: '#e9d5ff', glow: 16},
                2048: {bg: '#be123c', txt: '#ffffff', glow: 22}
            };

            for(let r=0; r<size2048; r++) {
                for(let c=0; c<size2048; c++) {
                    let val = grid2048[r][c];
                    let tX = startX + pad + c * (tileW + pad);
                    let tY = startY + pad + r * (tileW + pad);

                    ctx.save();
                    if (val > 0) {
                        let conf = colors[val] || {bg: '#4c1d95', txt: '#ffffff', glow: 25};
                        ctx.fillStyle = conf.bg;
                        if(conf.glow > 0) { ctx.shadowBlur = conf.glow; ctx.shadowColor = conf.bg; }
                        ctx.beginPath(); ctx.roundRect(tX, tY, tileW, tileW, 8); ctx.fill();
                        
                        ctx.shadowBlur = 0; ctx.fillStyle = conf.txt;
                        ctx.font = `bold ${tileW * (val > 100 ? 0.35 : 0.45)}px sans-serif`;
                        ctx.textAlign = "center"; ctx.textBaseline = "middle";
                        ctx.fillText(val, tX + tileW/2, tY + tileW/2);
                    } else {
                        ctx.fillStyle = '#080b14'; ctx.beginPath(); ctx.roundRect(tX, tY, tileW, tileW, 8); ctx.fill();
                    }
                    ctx.restore();
                }
            }
            updateAndRenderParticles();
            if(isGameRunning) gameLoopId = requestAnimationFrame(draw2048);
        }

        function handle2048Move(dir) {
            if (!isGameRunning) return;
            let moved = false;
            let rotatedGrid = grid2048;

            if (dir === 'up') rotatedGrid = rotateMatrixCounterClockwise(grid2048);
            if (dir === 'right') rotatedGrid = rotateMatrixClockwise(rotateMatrixClockwise(grid2048));
            if (dir === 'down') rotatedGrid = rotateMatrixClockwise(grid2048);

            for (let r = 0; r < size2048; r++) {
                let row = rotatedGrid[r].filter(v => v !== 0);
                let newRow = [];
                for (let i = 0; i < row.length; i++) {
                    if (row[i] === row[i + 1]) {
                        let mergedVal = row[i] * 2;
                        newRow.push(mergedVal); score2048 += mergedVal; i++; moved = true;
                        createExplosion(canvas.width/2, canvas.height/2, '#f59e0b', 5);
                        if(mergedVal === 2048) {
                            isGameRunning = false;
                            setTimeout(() => {
                                document.getElementById('overlay-title').innerText = "VI THÀNH TỰU!";
                                document.getElementById('overlay-title').className = "text-2xl font-black text-amber-400";
                                document.getElementById('overlay-desc').innerText = "Chúc mừng con trai! Con đã hợp thể thành công ô số huyền thoại 2048!";
                                document.getElementById('game-overlay').classList.remove('hidden');
                            }, 300);
                        }
                    } else { newRow.push(row[i]); }
                }
                while (newRow.length < size2048) newRow.push(0);
                if (JSON.stringify(rotatedGrid[r]) !== JSON.stringify(newRow)) moved = true;
                rotatedGrid[r] = newRow;
            }

            if (dir === 'up') grid2048 = rotateMatrixClockwise(rotatedGrid);
            else if (dir === 'right') grid2048 = rotateMatrixClockwise(rotateMatrixClockwise(rotatedGrid));
            else if (dir === 'down') grid2048 = rotateMatrixCounterClockwise(rotatedGrid);
            else grid2048 = rotatedGrid;

            if (moved) {
                add2048Tile(); updateScore(score2048);
                if (check2048GameOver()) triggerGameOver();
            }
        }

        function rotateMatrixClockwise(matrix) { return matrix[0].map((val, index) => matrix.map(row => row[index]).reverse()); }
        function rotateMatrixCounterClockwise(matrix) { return matrix[0].map((val, index) => matrix.map(row => row[row.length - 1 - index])); }

        function check2048GameOver() {
            for (let r = 0; r < size2048; r++) {
                for (let c = 0; c < size2048; c++) {
                    if (grid2048[r][c] === 0) return false;
                    if (c < size2048 - 1 && grid2048[r][c] === grid2048[r][c + 1]) return false;
                    if (r < size2048 - 1 && grid2048[r][c] === grid2048[r + 1][c]) return false;
                }
            }
            return true;
        }

        // =====================================================================
        // GAME 4: CHIẾN CƠ VŨ TRỤ
        // =====================================================================
        let playerShip, lasers, enemies, enemyTimer, killCount;

        function startShooterGame() {
            document.getElementById('game-overlay').classList.add('hidden');
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            isGameRunning = true; particles = []; lasers = []; enemies = [];
            playerShip = { x: canvas.width / 2 - 18, y: canvas.height - 80, w: 36, h: 32, isDragging: false };
            enemyTimer = 0; killCount = 0;

            function onMove(clientX, clientY) {
                let rect = canvas.getBoundingClientRect();
                let canvasX = (clientX - rect.left) * (canvas.width / rect.width);
                let canvasY = (clientY - rect.top) * (canvas.height / rect.height);
                
                const offsetY = 45;
                playerShip.x = canvasX - playerShip.w / 2;
                playerShip.y = canvasY - offsetY;
                
                if (playerShip.x < 0) playerShip.x = 0;
                if (playerShip.x > canvas.width - playerShip.w) playerShip.x = canvas.width - playerShip.w;
                if (playerShip.y < 0) playerShip.y = 0;
                if (playerShip.y > canvas.height - playerShip.h) playerShip.y = canvas.height - playerShip.h;
            }

            canvas.onmousedown = () => playerShip.isDragging = true;
            window.onmouseup = () => playerShip.isDragging = false;
            canvas.onmousemove = (e) => { if(isGameRunning) onMove(e.clientX, e.clientY); };

            canvas.ontouchstart = () => playerShip.isDragging = true;
            window.ontouchend = () => playerShip.isDragging = false;
            canvas.ontouchmove = (e) => { e.preventDefault(); if(isGameRunning) onMove(e.touches[0].clientX, e.touches[0].clientY); };
            
            function loop() {
                if (!isGameRunning) return;
                ctx.fillStyle = '#04040a'; ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (Math.random() > 0.88) lasers.push({ x: playerShip.x + playerShip.w/2 - 2, y: playerShip.y, w: 3.5, h: 14, speed: 7.5 });

                ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#f43f5e';
                ctx.fillStyle = '#e11d48';
                ctx.beginPath(); ctx.moveTo(playerShip.x + playerShip.w/2, playerShip.y);
                ctx.lineTo(playerShip.x + playerShip.w, playerShip.y + playerShip.h);
                ctx.lineTo(playerShip.x + playerShip.w/2, playerShip.y + playerShip.h * 0.78);
                ctx.lineTo(playerShip.x, playerShip.y + playerShip.h); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#22d3ee'; ctx.fillRect(playerShip.x + playerShip.w/2 - 3, playerShip.y + playerShip.h - 2, 6, 5);
                ctx.restore();

                for (let i = lasers.length - 1; i >= 0; i--) {
                    let l = lasers[i]; l.y -= l.speed;
                    if (l.y < 0) { lasers.splice(i, 1); continue; }
                    ctx.save(); ctx.fillStyle = '#38bdf8'; ctx.shadowBlur = 8; ctx.shadowColor = '#38bdf8';
                    ctx.fillRect(l.x, l.y, l.w, l.h); ctx.restore();
                }

                enemyTimer++;
                if (enemyTimer > Math.max(25, 55 - killCount * 0.4)) {
                    enemies.push({ x: Math.random() * (canvas.width - 30), y: -30, w: 28, h: 24, speed: 1.8 + Math.random() * 1.5 });
                    enemyTimer = 0;
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i]; e.y += e.speed;
                    if (e.y > canvas.height) { triggerGameOver(); return; }

                    ctx.save(); ctx.shadowBlur = 8; ctx.shadowColor = '#a855f7'; ctx.fillStyle = '#a855f7';
                    ctx.beginPath(); ctx.roundRect(e.x, e.y, e.w, e.h, 6); ctx.fill();
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(e.x + 5, e.y + 6, 4, 4); ctx.fillRect(e.x + e.w - 9, e.y + 6, 4, 4);
                    ctx.restore();

                    if (playerShip.x < e.x + e.w && playerShip.x + playerShip.w > e.x &&
                        playerShip.y < e.y + e.h && playerShip.y + playerShip.h > e.y) {
                        createExplosion(e.x + e.w/2, e.y + e.h/2, '#ef4444', 25);
                        triggerGameOver(); return;
                    }

                    for (let j = lasers.length - 1; j >= 0; j--) {
                        let l = lasers[j];
                        if (l.x > e.x && l.x < e.x + e.w && l.y > e.y && l.y < e.y + e.h) {
                            createExplosion(e.x + e.w/2, e.y + e.h/2, '#c084fc', 12);
                            enemies.splice(i, 1); lasers.splice(j, 1);
                            killCount++; updateScore(killCount * 10);
                            break;
                        }
                    }
                }
                updateAndRenderParticles();
                gameLoopId = requestAnimationFrame(loop);
            }
            loop();
        }

        // =====================================================================
        // GAME 5: RẮN SĂN MỒI CYBER
        // =====================================================================
        let snake, food, dx, dy, snakeTimer, snakeScore;
        
        function startSnakeGame() {
            document.getElementById('game-overlay').classList.add('hidden');
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            isGameRunning = true; particles = [];
            
            snake = [{x: 200, y: 300}, {x: 180, y: 300}, {x: 160, y: 300}];
            dx = 20; dy = 0; snakeScore = 0; snakeTimer = 0;
            generateSnakeFood();
        
            let touchStartX = 0, touchStartY = 0;
        
            canvas.ontouchstart = (e) => {
                e.preventDefault();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            };
        
            canvas.ontouchend = (e) => {
                e.preventDefault();
                if (!isGameRunning) return;
        
                let touchEndX = e.changedTouches[0].clientX;
                let touchEndY = e.changedTouches[0].clientY;
                let diffX = touchEndX - touchStartX;
                let diffY = touchEndY - touchStartY;
                const threshold = 15; 
        
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (Math.abs(diffX) > threshold) {
                        if (diffX > 0 && dx === 0) { dx = 20; dy = 0; }
                        else if (diffX < 0 && dx === 0) { dx = -20; dy = 0; }
                    }
                } else {
                    if (Math.abs(diffY) > threshold) {
                        if (diffY > 0 && dy === 0) { dx = 0; dy = 20; }
                        else if (diffY < 0 && dy === 0) { dx = 0; dy = -20; }
                    }
                }
            };
        
            canvas.onmousedown = null;
            
            window.onkeydown = (e) => {
                if (!isGameRunning) return;
                if (e.code === 'ArrowLeft' && dx === 0) { dx = -20; dy = 0; }
                if (e.code === 'ArrowRight' && dx === 0) { dx = 20; dy = 0; }
                if (e.code === 'ArrowUp' && dy === 0) { dx = 0; dy = -20; }
                if (e.code === 'ArrowDown' && dy === 0) { dx = 0; dy = 20; }
            };
        
            function loop() {
                if (!isGameRunning) return;
                
                snakeTimer++;
                if (snakeTimer >= 20) {
                    snakeTimer = 0;
                    
                    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
                    snake.unshift(head);
        
                    if (head.x === food.x && head.y === food.y) {
                        snakeScore += 10;
                        updateScore(snakeScore);
                        createExplosion(food.x + 10, food.y + 10, '#10b981', 12);
                        generateSnakeFood();
                    } else {
                        snake.pop();
                    }
        
                    if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || checkSnakeCollision(head)) {
                        triggerGameOver();
                        return;
                    }
                }
        
                ctx.fillStyle = '#0b0f19'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#10b981';
                ctx.fillStyle = '#10b981'; ctx.beginPath(); ctx.arc(food.x + 10, food.y + 10, 10, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        
                snake.forEach((part, index) => {
                    ctx.save();
                    if (index === 0) {
                        ctx.fillStyle = '#34d399'; ctx.shadowBlur = 8; ctx.shadowColor = '#34d399';
                    } else {
                        ctx.fillStyle = '#047857';
                    }
                    ctx.beginPath(); ctx.roundRect(part.x + 1, part.y + 1, 18, 18, 4); ctx.fill(); ctx.restore();
                });
        
                updateAndRenderParticles();
                gameLoopId = requestAnimationFrame(loop);
            }
            loop();
        }
        
        function generateSnakeFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / 20)) * 20,
                y: Math.floor(Math.random() * (canvas.height / 20)) * 20
            };
        }
        
        function checkSnakeCollision(head) {
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        // =====================================================================
        // GAME 6: PHÁ HỦY BỨC TƯỜNG (MÔ ĐẦU KHÓA KHE - 3 KHỐI VŨ TRỤ 3x3 CHẮN ĐÁY)
        // =====================================================================
        let paddle, ball;
        let activeBricksArray = []; // Mảng phẳng tối ưu 60 FPS
        // Mở rộng ma trận lên 28 hàng để đủ không gian cho 3 cụm (5 hàng) + 1 cụm (3 hàng) + các khoảng trống 3 hàng
        const brickRows = 28, brickCols = 14, brickHeight = 8, brickPadding = 0, brickOffsetTop = 40, brickOffsetLeft = 10;
        
        function startBreakerGame() {
            document.getElementById('game-overlay').classList.add('hidden');
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            isGameRunning = true; score = 0; particles = [];
            activeBricksArray = [];
            
            paddle = { x: canvas.width / 2 - 30, y: canvas.height - 40, w: 60, h: 8 };
            // Bán kính bóng 3px, di chuyển chuẩn xác trong các hành lang rộng
            ball = { x: canvas.width / 2, y: canvas.height - 60, radius: 3, dx: 2.2, dy: -4.5 };
            
            // Tính toán độ rộng viên gạch (Xếp sát nhau hoàn toàn vì brickPadding = 0)
            const brickWidth = (canvas.width - (brickOffsetLeft * 2)) / brickCols;

            for (let r = 0; r < brickRows; r++) {
                for (let c = 0; c < brickCols; c++) {
                    let isBrick = false;
                    let isConcrete = false;
                    let clusterIndex = 0;

                    // ---------------------------------------------------------
                    // TẦNG TRÊN: 3 CỤM SO LE LỚN (Mỗi cụm dày 5 hàng, cách nhau 3 hàng trống)
                    // ---------------------------------------------------------
                    // CỤM 1: Hàng 0 -> 4 | Nằm bên trái (Cột 0 -> 9). Hở khe phải (Cột 10-13)
                    if (r >= 0 && r <= 4) {
                        clusterIndex = 1;
                        if (c >= 0 && c <= 9) {
                            isBrick = true;
                            if (r === 4 && c === 9) isConcrete = true; // Bê tông chặn mép khe
                        }
                    }
                    // Khoảng trống 1: Hàng 5, 6, 7 (Trống 3 hàng gạch)

                    // CỤM 2: Hàng 8 -> 12 | Nằm bên phải (Cột 4 -> 13). Hở khe trái (Cột 0-3)
                    else if (r >= 8 && r <= 12) {
                        clusterIndex = 2;
                        if (c >= 4 && c <= 13) {
                            isBrick = true;
                            if (r === 8 && c === 4) isConcrete = true; // Bê tông chặn mép khe dưới
                        }
                    }
                    // Khoảng trống 2: Hàng 13, 14, 15 (Trống 3 hàng gạch)

                    // CỤM 3: Hàng 16 -> 20 | Nằm bên trái (Cột 0 -> 9). Hở khe phải (Cột 10-13)
                    else if (r >= 16 && r <= 20) {
                        clusterIndex = 3;
                        if (c >= 0 && c <= 9) {
                            isBrick = true;
                            if (r === 20 && c === 9) isConcrete = true;
                        }
                    }
                    // Khoảng trống 3: Hàng 21, 22, 23 (Trống 3 hàng gạch)

                    // ---------------------------------------------------------
                    // TẦNG ĐÁY: CỤM 4 GỒM 3 KHỐI vuông 3x3 (Hàng 24, 25, 26)
                    // ---------------------------------------------------------
                    else if (r >= 24 && r <= 26) {
                        clusterIndex = 4;
                        // Khối 3x3 số 1: Cột 1, 2, 3
                        if (c >= 1 && c <= 3) {
                            isBrick = true;
                            if (r === 25 && c === 2) isConcrete = true; // Bê tông nằm CHÍNH GIỮA khối 1
                        }
                        // Khối 3x3 số 2: Cột 5, 6, 7
                        else if (c >= 5 && c <= 7) {
                            isBrick = true;
                            if (r === 25 && c === 6) isConcrete = true; // Bê tông nằm CHÍNH GIỮA khối 2
                        }
                        // Khối 3x3 số 3: Cột 9, 10, 11
                        else if (c >= 9 && c <= 11) {
                            isBrick = true;
                            if (r === 25 && c === 10) isConcrete = true; // Bê tông nằm CHÍNH GIỮA khối 3
                        }
                        // Các cột trống 0, 4, 8, 12, 13 tạo thành các khe lọt bóng thẳng lên trên
                    }
                    
                    if (isBrick) {
                        let bX = c * brickWidth + brickOffsetLeft;
                        let bY = r * brickHeight + brickOffsetTop;
                        
                        activeBricksArray.push({ 
                            x: bX, 
                            y: bY, 
                            w: brickWidth,
                            h: brickHeight,
                            type: isConcrete ? 'concrete' : 'normal',
                            cluster: clusterIndex
                        });
                    }
                }
            }

            function movePaddle(clientX) {
                let rect = canvas.getBoundingClientRect();
                let canvasX = (clientX - rect.left) * (canvas.width / rect.width);
                paddle.x = canvasX - paddle.w / 2;
                if (paddle.x < 0) paddle.x = 0;
                if (paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;
            }

            canvas.onmousemove = (e) => { if (isGameRunning) movePaddle(e.clientX); };
            canvas.ontouchmove = (e) => { if (isGameRunning) movePaddle(e.touches[0].clientX); };

            function loop() {
                if (!isGameRunning) return;
                ctx.fillStyle = '#060813'; ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Va chạm biên
                if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) ball.dx = -ball.dx;
                if (ball.y + ball.dy < ball.radius) ball.dy = -ball.dy;

                // Va chạm thanh đỡ
                if (ball.y + ball.dy > paddle.y - ball.radius) {
                    if (ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                        let hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                        ball.dx = hitPos * 5;
                        ball.dy = -Math.abs(ball.dy);
                        createExplosion(ball.x, ball.y, '#22d3ee', 4);
                    } else if (ball.y + ball.dy > canvas.height - ball.radius) {
                        createExplosion(ball.x, ball.y, '#ef4444', 20);
                        triggerGameOver();
                        return;
                    }
                }

                ball.x += ball.dx;
                ball.y += ball.dy;

                // Xử lý vẽ và va chạm gạch mượt mà từ mảng phẳng
                let activeNormalCount = 0;
                const clusterColors = ['#000000', '#f43f5e', '#a855f7', '#06b6d4', '#eab308']; // Thêm màu vàng chanh cho cụm 3x3 đáy

                for (let i = activeBricksArray.length - 1; i >= 0; i--) {
                    let b = activeBricksArray[i];
                    if (b.type === 'normal') activeNormalCount++;

                    // Thuật toán va chạm AABB độ chính xác cao
                    if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + b.w &&
                        ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + b.h) {
                        
                        ball.dy = -ball.dy;
                        
                        if (b.type === 'normal') {
                            createExplosion(b.x + b.w/2, b.y + b.h/2, '#06b6d4', 6);
                            score += 10;
                            updateScore(score);
                            activeBricksArray.splice(i, 1); // Xóa gạch vỡ khỏi bộ nhớ lập tức
                            continue; 
                        } else {
                            createExplosion(ball.x, ball.y, '#ffffff', 4); // Gạch bê tông tóe lửa trắng
                        }
                    }

                    // Tiến hành RENDER đồ họa siêu nhẹ (Không dùng shadowBlur gây lag)
                    ctx.save();
                    if (b.type === 'concrete') {
                        // Gạch bê tông cốt thép lõi khối màu xám kim loại cường độ cao
                        ctx.fillStyle = '#475569';
                        ctx.strokeStyle = '#cbd5e1';
                        ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 0.5); ctx.fill(); ctx.stroke();
                    } else {
                        // Gạch thường: Đổ màu đặc khối theo phân cấp tầng cụm
                        ctx.fillStyle = clusterColors[b.cluster];
                        ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 0.5); ctx.fill();
                        
                        // Khảm nhẹ đường viền mảnh để phân tách các viên gạch sát nhau một cách tinh tế
                        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                    ctx.restore();
                }

                // Điều kiện thắng cuộc (Chỉ tính gạch màu thường)
                if (activeNormalCount === 0) {
                    isGameRunning = false;
                    setTimeout(() => {
                        document.getElementById('overlay-title').innerText = "VUA PHÁ GẠCH!";
                        document.getElementById('overlay-desc').innerText = `Quá đẳng cấp! Bé đã tìm đường lách khe phá sạch ma trận pháo đài và đạt: ${score} điểm!`;
                        document.getElementById('game-overlay').classList.remove('hidden');
                    }, 300);
                    return;
                }

                // Vẽ thanh đỡ
                ctx.save();
                ctx.fillStyle = '#22d3ee';
                ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 2); ctx.fill();
                ctx.restore();

                // Vẽ quả bóng phát sáng duy nhất để giữ hiệu năng mượt
                ctx.save();
                ctx.fillStyle = '#facc15';
                ctx.shadowBlur = 5; ctx.shadowColor = '#facc15';
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                updateAndRenderParticles();
                gameLoopId = requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
